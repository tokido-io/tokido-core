name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  # setup-java `cache: maven` uses actions/cache, which needs Actions cache API access
  actions: write

jobs:
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify pom versions are release (not SNAPSHOT)
        run: |
          set -euo pipefail
          # The maintainer bumps -SNAPSHOT to release locally before tagging
          # (per Task 10 of the M0 plan and ADR-0010). This step guards against
          # accidentally tagging a SNAPSHOT.
          if grep -q 'SNAPSHOT' pom.xml \
                tokido-core-identity-api/pom.xml \
                tokido-core-identity-engine/pom.xml \
                tokido-core-identity-jwt/pom.xml \
                tokido-core-identity-broker/pom.xml \
                tokido-core-identity-mfa/pom.xml \
                tokido-core-identity-conformance/pom.xml \
                tokido-core-api/pom.xml \
                tokido-core-test/pom.xml \
                tokido-core-engine/pom.xml \
                tokido-core-totp/pom.xml \
                tokido-core-recovery/pom.xml; then
            echo "::error::Found SNAPSHOT version in a pom. Maintainer must bump to release before tagging."
            grep -H 'SNAPSHOT' pom.xml */pom.xml || true
            exit 1
          fi
          echo "All poms at release versions."

      - name: Build and verify
        run: mvn verify -P release -DskipITs
        env:
          # The release profile triggers maven-gpg-plugin during the verify
          # phase, which the parent settings.xml resolves via ${env.GPG_PASSPHRASE}.
          # Without this env block, the verify step fails with "Bad passphrase".
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify source and Javadoc artifacts
        run: |
          set -euo pipefail
          # Existing modules ride at parent (2.0.0-MX) version.
          # Resolve the version each module shipped at, and check that source/javadoc
          # jars exist for everything that's published to Central.
          # The conformance module is intentionally NOT published (maven.deploy.skip=true).
          for m in tokido-core-api tokido-core-test tokido-core-engine tokido-core-totp tokido-core-recovery \
                   tokido-core-identity-api tokido-core-identity-engine tokido-core-identity-jwt \
                   tokido-core-identity-broker tokido-core-identity-mfa; do
            v=$(mvn -pl "$m" -q help:evaluate -Dexpression=project.version -DforceStdout)
            test -f "$m/target/${m}-${v}.jar"             || { echo "::error::missing jar for $m@$v"; exit 1; }
            test -f "$m/target/${m}-${v}-sources.jar"     || { echo "::error::missing sources jar for $m@$v"; exit 1; }
            test -f "$m/target/${m}-${v}-javadoc.jar"     || { echo "::error::missing javadoc jar for $m@$v"; exit 1; }
          done

      - name: Publish to Maven Central
        run: mvn deploy -P release -DskipTests -DskipITs
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
